<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #020617;
      color: #f1f5f9;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 12px;
    }
    .logo {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(135deg, #4f46e5, #c084fc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
      color: white;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    .card {
      background-color: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .source-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      width: fit-content;
    }
    .source-youtube { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    .source-netflix { background: rgba(220, 38, 38, 0.1); color: #f87171; border: 1px solid rgba(220, 38, 38, 0.2); }
    .source-instagram { background: rgba(236, 72, 153, 0.1); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.2); }
    .source-manual { background: rgba(99, 102, 241, 0.1); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.2); }

    .item-title {
      font-size: 12px;
      font-weight: 600;
      line-clamp: 2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    label {
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    select {
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      color: #f1f5f9;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus {
      border-color: #6366f1;
    }
    button {
      width: 100%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 8px;
      padding: 10px;
      color: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      font-size: 11px;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }
    .status-success {
      background-color: rgba(16, 185, 129, 0.1);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .status-error {
      background-color: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .status-loading {
      background-color: rgba(148, 163, 184, 0.1);
      color: #cbd5e1;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">H</div>
    <div class="title">Homepage Sync</div>
  </div>

  <div id="detected-card" class="card">
    <div id="source-badge" class="source-badge source-manual">Web Page</div>
    <div id="item-title" class="item-title">Detecting page content...</div>
  </div>

  <div class="form-group">
    <label for="playlist-select">Target Playlist</label>
    <select id="playlist-select">
      <option value="Watch Later">Watch Later</option>
      <option value="Research & Learning">Research & Learning</option>
      <option value="Inspiration">Inspiration</option>
      <option value="Instagram Saved">Instagram Saved</option>
      <option value="Netflix List">Netflix List</option>
    </select>
  </div>

  <button id="sync-btn" disabled>Sync to Dashboard</button>

  <div id="status-box" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
